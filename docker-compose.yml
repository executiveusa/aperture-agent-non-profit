version: '3.9'
services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      API_BASE_URL: http://api:4000
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/overview"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgres://aperture:aperture@postgres:5432/aperture
      REDIS_URL: redis://redis:6379
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN}
      API_PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      EVIDENCE_DIR: /evidence
    volumes:
      - evidence:/evidence
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aperture
      POSTGRES_PASSWORD: aperture
      POSTGRES_DB: aperture
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aperture -d aperture"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  evidence:
